                      <p className="text-indigo-200 text-xs mt-0.5">Điểm Sức Bản Thân: <span className="font-bold text-white text-sm">{userPointsLimit} Pts</span></p>
                    </div>

                    <div className="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm space-y-2.5">
                      <h3 className="font-bold text-xs text-slate-800 uppercase tracking-wider flex items-center gap-1.5">
                        <Award size={14} className="text-indigo-600" /> Bản Đồ Xếp Hạng
                      </h3>
                      <div className="grid grid-cols-2 gap-2 text-xs">
                        <div className="bg-amber-50 p-2 rounded-xl border border-amber-100 flex items-center gap-1.5"><span>🥉</span><div><p className="font-bold text-amber-900">Đồng</p><p className="text-[9px]">20-34 Pts</p></div></div>
                        <div className="bg-slate-50 p-2 rounded-xl border border-slate-100 flex items-center gap-1.5"><span>🥈</span><div><p className="font-bold text-slate-900">Bạc</p><p className="text-[9px]">35-44 Pts</p></div></div>
                        <div className="bg-yellow-50 p-2 rounded-xl border border-yellow-100 flex items-center gap-1.5"><span>🥇</span><div><p className="font-bold text-yellow-900">Vàng</p><p className="text-[9px]">45-54 Pts</p></div></div>
                        <div className="bg-cyan-50 p-2 rounded-xl border border-cyan-100 flex items-center gap-1.5"><span>💎</span><div><p className="font-bold text-cyan-900">Bạch Kim</p><p className="text-[9px]">55-64 Pts</p></div></div>
                        <div className="bg-blue-50 p-2 rounded-xl border border-blue-100 flex items-center gap-1.5"><span>❄️</span><div><p className="font-bold text-blue-900">Kim Cương</p><p className="text-[9px]">65-74 Pts</p></div></div>
                        <div className="bg-purple-50 p-2 rounded-xl border border-purple-100 flex items-center gap-1.5 col-span-2"><span>🔥</span><div><p className="font-bold text-purple-900">Cao Thủ</p><p className="text-[9px]">&gt;= 75 Pts</p></div></div>
                      </div>
                    </div>
                  </div>

                {/* TAB 5: HỒ SƠ & CÀI ĐẶT */}
                {activeTab === 'settings' && (
                  <div className="space-y-4 animate-in fade-in duration-200">

                      <h3 className="font-bold text-slate-800 text-xs uppercase tracking-wider flex items-center gap-1.5">
                        <Activity size={14} className="text-indigo-500" /> Chỉ số cơ thể
                      </h3>
                      <div className="grid grid-cols-2 gap-3">
                        <div>
                          <label className="block text-[10px] font-bold text-slate-400 uppercase mb-1">Cân nặng (kg)</label>
                          <input type="number" step="0.1" value={profile.weight} onChange={(e) => handleProfileChange('weight', e.target.value)} className="w-full border border-slate-200 rounded-xl p-2.5 text-xs font-semibold focus:border-indigo-500 outline-none" />
                        </div>
                        <div>
                          <label className="block text-[10px] font-bold text-slate-400 uppercase mb-1">Chiều cao (m)</label>
                          <input type="number" step="0.01" value={profile.height} onChange={(e) => handleProfileChange('height', e.target.value)} className="w-full border border-slate-200 rounded-xl p-2.5 text-xs font-semibold focus:border-indigo-500 outline-none" />
                        </div>
                      </div>
                    </div>

                    {/* Cấu hình Gemini API */}
                    <div className="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 space-y-3">
                      <h3 className="font-bold text-slate-800 text-xs uppercase tracking-wider flex items-center gap-1.5 text-indigo-600">
                        <Sparkles size={14} /> Gemini Developer API Key
                      </h3>
                      <p className="text-[10px] text-slate-400 leading-relaxed">
                        Nhập khóa API Gemini để kích hoạt tính năng HLV Trí Tuệ Nhân Tạo phân tích sức bền và cơ khớp:
                      </p>
                      <input 
                        type="password" 
                        value={geminiApiKey} 
                        onChange={(e) => { setGeminiApiKey(e.target.value); localStorage.setItem('gemini_api_key', JSON.stringify(e.target.value)); }} 
                        className="w-full border border-slate-200 rounded-xl p-2.5 text-xs font-semibold focus:border-indigo-500 outline-none" 
                        placeholder="Nhập API Key bắt đầu bằng AIzaSy..." 
                      />
                      <div className="text-[9px] text-slate-400 flex justify-between">
                        <span>Được lưu cục bộ bảo mật trên máy của bạn.</span>
                        <a href="https://aistudio.google.com/" target="_blank" rel="noreferrer" className="text-indigo-600 font-bold hover:underline">Lấy Key Miễn Phí 🔗</a>
                      </div>
                    </div>

                    {/* Cài đặt API Sheet */}
                    <div className="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 space-y-3">
                      <h3 className="font-bold text-slate-800 text-xs uppercase tracking-wider flex items-center gap-1.5">
                        <Save size={14} className="text-emerald-500" /> Google Sheets API URL
                      </h3>
                      <p className="text-[10px] text-slate-400 leading-relaxed">

                      </p>

                        </button>
                      </div>
                    </div>

                    {/* CONSOLE TRỰC QUAN TRONG SETTINGS */}

                        <button 
                          onClick={handleCopyLogsToClipboard}

                        </button>
                      </div>
                      <div className="bg-black/40 border border-slate-800/80 rounded-xl p-2.5 h-36 overflow-y-auto text-[10px] font-mono space-y-1.5 custom-scrollbar">
                        {syncLogs.map((log, idx) => (
                          <div key={idx} className="flex items-start gap-1">
                            <span className="text-slate-500 flex-shrink-0">[{log.time}]</span>
                            <span className={log.type === 'error' ? 'text-red-400' : log.type === 'success' ? 'text-emerald-400' : 'text-slate-300'}>
                              {log.message}
                            </span>
                          </div>
                        ))}
                      </div>
                    </div>

                  </div>
                )}

              </main>

              {/* NAV BOTTOM BAR: GHIM CHẶT HOÀN TOÀN Ở ĐÁY KHÔNG BỊ TRÀN CHROME MOBILE */}
              {}
              <nav className="absolute bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md border-t border-slate-100 pb-safe z-20 shadow-[0_-8px_30px_rgb(0,0,0,0.03)] rounded-t-[24px] flex-shrink-0">
                <div className="flex justify-around items-center h-16 max-w-md mx-auto px-1">
                  <button onClick={() => setActiveTab('dashboard')} className={`flex flex-col items-center justify-center w-full h-full space-y-1 transition-all-200 ${activeTab === 'dashboard' ? 'text-indigo-600 scale-105' : 'text-slate-400'}`}>
                    <Home size={18} className={activeTab === 'dashboard' ? 'fill-indigo-50' : ''} />
                    <span className="text-[9px] font-extrabold tracking-tight">Tổng quan</span>
                  </button>
                  <button onClick={() => setActiveTab('exercises')} className={`flex flex-col items-center justify-center w-full h-full space-y-1 transition-all-200 ${activeTab === 'exercises' ? 'text-indigo-600 scale-105' : 'text-slate-400'}`}>
                    <Activity size={18} className={activeTab === 'exercises' ? 'fill-indigo-50' : ''} />

                  </button>

                    <span className="text-[9px] font-extrabold tracking-tight">Lịch tập</span>
                  </button>
                  <button onClick={() => setActiveTab('ranking')} className={`flex flex-col items-center justify-center w-full h-full space-y-1 transition-all-200 ${activeTab === 'ranking' ? 'text-indigo-600 scale-105' : 'text-slate-400'}`}>
                    <Award size={18} className={activeTab === 'ranking' ? 'fill-indigo-50' : ''} />
                    <span className="text-[9px] font-extrabold tracking-tight">Xếp hạng</span>
                  </button>
                  <button onClick={() => setActiveTab('settings')} className={`flex flex-col items-center justify-center w-full h-full space-y-1 transition-all-200 ${activeTab === 'settings' ? 'text-indigo-600 scale-105' : 'text-slate-400'}`}>
                    <Settings size={18} className={activeTab === 'settings' ? 'fill-indigo-50' : ''} />
                    <span className="text-[9px] font-extrabold tracking-tight">Cài đặt</span>
                  </button>
                </div>
              </nav>

              {/* === MODAL HIỂN THỊ KẾT QUẢ PHÂN TÍCH GEMINI AI VÀ CHỌN LỰA ĐIỀU CHỈNH === */}

              {aiModal.isOpen && (
                <div className="fixed inset-0 bg-slate-900/85 z-50 flex items-end justify-center p-4 backdrop-blur-sm animate-in fade-in duration-200">
                  <div className="bg-white rounded-[28px] shadow-2xl max-w-md w-full overflow-hidden p-5 flex flex-col h-[580px] animate-in slide-in-from-bottom-8 duration-300">
                    <div className="flex justify-between items-center mb-3">
                      <h3 className="font-black text-indigo-600 text-xs uppercase tracking-widest flex items-center gap-1.5">
                        <Sparkles size={16} className="text-indigo-500 animate-spin" /> Gemini AI Optimizer
                      </h3>
                      {!aiModal.isLoading && (
                        <button 
                          onClick={() => setAiModal({ isOpen: false, isLoading: false, analysis: '', adjustments: [], newSuggestions: [] })}
                          className="px-2.5 py-1 bg-slate-100 hover:bg-slate-200 text-slate-500 text-[10px] rounded-lg font-bold transition active:scale-95"
                        >
                          Đóng
                        </button>
                      )}
                    </div>

                    {aiModal.isLoading ? (
                      <div className="flex-1 flex flex-col items-center justify-center text-center space-y-4">
                        <div className="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
                        <div>
                          <p className="font-bold text-xs text-slate-800">Đang khởi tạo nơ-ron AI...</p>
                          <p className="text-[10px] text-slate-400 mt-1 max-w-[250px] mx-auto">Gemini đang đo lường mô phỏng áp lực khớp dựa trên chiều cao {profile.height}m, cân nặng {profile.weight}kg và 38kg cơ bắp của bạn.</p>
                        </div>
                      </div>
                    ) : (
                      <div className="flex-1 flex flex-col overflow-hidden space-y-4">
                        {/* Lời khuyên phân tích */}
                        <div className="bg-indigo-50/50 border border-indigo-100 rounded-2xl p-3.5 flex-shrink-0">
                          <h4 className="text-[10px] font-bold text-indigo-700 uppercase tracking-wide mb-1 flex items-center gap-1">
                            📋 Đánh giá thể lực (Hệ cơ số 5)
                          </h4>
                          <p className="text-slate-600 text-[11px] leading-relaxed italic">
                            "{aiModal.analysis}"
                          </p>
                        </div>

                        {/* Danh sách so sánh Before/After kèm Checkbox chọn áp dụng */}
                        <div className="flex-1 overflow-y-auto space-y-2.5 custom-scrollbar pr-1">
                          <p className="text-[9px] font-bold text-slate-400 uppercase tracking-widest px-1">Chạm vào bài tập muốn áp dụng:</p>
                          
                          {/* 1. Phần bài tập CŨ được ĐIỀU CHỈNH (Có hộp chọn màu Vàng/Amber) */}
                          {aiModal.adjustments.map(adj => {
                            const original = exercises.find(e => e.id === adj.id);
                            if (!original) return null;
                            const isSelected = selectedAdjIds.includes(adj.id);
                            
                            return (
                              <div 
                                key={adj.id} 
                                onClick={() => {
                                  setSelectedAdjIds(prev => 
                                    prev.includes(adj.id) ? prev.filter(id => id !== adj.id) : [...prev, adj.id]
                                  );
                                }}
                                className={`p-3 rounded-2xl border transition-all duration-200 cursor-pointer ${
                                  isSelected 
                                    ? 'bg-amber-50/60 border-amber-400 shadow-sm' 
                                    : 'bg-slate-50/40 border-slate-200 opacity-60 hover:opacity-85'
                                } flex flex-col justify-between`}
                              >
                                <div className="flex justify-between items-start">
                                  <div className="flex items-center gap-2">
                                    <div className={`w-4 h-4 rounded-full flex items-center justify-center border transition-all ${
                                      isSelected ? 'bg-amber-500 border-amber-500 text-white' : 'border-slate-300 text-transparent'
                                    }`}>
                                      <span className="text-[9px] font-bold">✓</span>
                                    </div>
                                    <span className="font-bold text-xs text-slate-800">{original.name}</span>
                                  </div>
                                  <span className={`text-[8px] font-bold px-2 py-0.5 rounded-full border ${
                                    isSelected ? 'bg-amber-100 text-amber-800 border-amber-200' : 'bg-slate-100 text-slate-500 border-slate-200'
                                  }`}>
                                    Điều chỉnh
                                  </span>
                                </div>
                                <div className="grid grid-cols-2 gap-2 mt-2 pt-2 border-t border-dashed border-slate-200/60 text-[10px]">
                                  <div className="text-slate-400">
                                    Cũ: <span className="font-semibold">{original.target_sets}x{original.target_value} {original.unit}</span> ({original.point}p)
                                  </div>
                                  <div className={`font-extrabold text-right ${isSelected ? 'text-amber-800' : 'text-slate-500'}`}>
                                    Mới: <span>{adj.target_sets}x{adj.target_value} {original.unit}</span> (<span className="underline">{adj.point}p</span>)
                                  </div>
                                </div>
                              </div>
                            );
                          })}

                          {/* 2. Phần bài tập MỚI được THÊM MỚI (Có hộp chọn màu Xanh Lá/Emerald) */}
                          {aiModal.newSuggestions.map((newEx, idx) => {
                            const isSelected = selectedNewSugIndices.includes(idx);
                            return (
                              <div 
                                key={'new_' + idx} 
                                onClick={() => {
                                  setSelectedNewSugIndices(prev => 
                                    prev.includes(idx) ? prev.filter(i => i !== idx) : [...prev, idx]
                                  );
                                }}
                                className={`p-3 rounded-2xl border transition-all duration-200 cursor-pointer ${
                                  isSelected 
                                    ? 'bg-emerald-50/50 border-emerald-400 shadow-sm' 
                                    : 'bg-slate-50/40 border-slate-200 opacity-60 hover:opacity-85'
                                } flex flex-col justify-between`}
                              >
                                <div className="flex justify-between items-start">
                                  <div className="flex items-center gap-2">
                                    <div className={`w-4 h-4 rounded-full flex items-center justify-center border transition-all ${
                                      isSelected ? 'bg-emerald-600 border-emerald-600 text-white' : 'border-slate-300 text-transparent'
                                    }`}>
                                      <span className="text-[9px] font-bold">✓</span>
                                    </div>
                                    <span className="font-bold text-xs text-slate-800">{newEx.name}</span>
                                  </div>
                                  <span className={`text-[8px] font-bold px-2 py-0.5 rounded-full border ${
                                    isSelected ? 'bg-emerald-100 text-emerald-800 border-emerald-200' : 'bg-slate-100 text-slate-500 border-slate-200'
                                  }`}>
                                    Thêm mới
                                  </span>
                                </div>
                                <div className="flex justify-between items-center mt-2 pt-2 border-t border-dashed border-slate-200/60 text-[10px]">
                                  <div className="text-slate-400">Bài tập bổ trợ an toàn</div>
                                  <div className={`font-extrabold text-right ${isSelected ? 'text-emerald-700' : 'text-slate-500'}`}>
                                    Định lượng: {newEx.target_sets}x{newEx.target_value} {newEx.unit} ({newEx.point}p)
                                  </div>
                                </div>
                              </div>
                            );
                          })}
                        </div>

                        <div className="pt-3 border-t border-slate-100 flex gap-2 flex-shrink-0">
                          <button 
                            onClick={() => {
                              setAiModal({ isOpen: false, isLoading: false, analysis: '', adjustments: [], newSuggestions: [] });
                              setSelectedAdjIds([]);
                              setSelectedNewSugIndices([]);
                            }}
                            className="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-2.5 rounded-xl text-xs transition active:scale-95"
                          >
                            Bỏ qua
                          </button>
                          <button 
                            onClick={applyAiAdjustments}
                            disabled={selectedAdjIds.length === 0 && selectedNewSugIndices.length === 0}
                            className={`flex-1 font-extrabold py-2.5 rounded-xl text-xs tracking-wide uppercase transition active:scale-95 shadow-md ${
                              (selectedAdjIds.length > 0 || selectedNewSugIndices.length > 0)
                                ? 'bg-indigo-600 hover:bg-indigo-700 text-white cursor-pointer'
                                : 'bg-slate-200 text-slate-400 cursor-not-allowed'
                            }`}
                          >
                            Áp Dụng ({selectedAdjIds.length + selectedNewSugIndices.length})
                          </button>
                        </div>
                      </div>
                    )}
                  </div>
                </div>
              )}

              {/* === CONSOLE MODAL ĐỘC LẬP === */}
              {isConsoleOpen && (
                <div className="fixed inset-0 bg-slate-900/80 z-50 flex items-end justify-center p-4 backdrop-blur-sm animate-in fade-in duration-200">

                    <div className="flex justify-between items-center mb-3">
                      <h3 className="font-black text-indigo-400 text-xs uppercase tracking-widest flex items-center gap-1.5">
                        <TerminalIcon size={16} /> Sync Console Live log
                      </h3>
                      <div className="flex gap-1.5">
                        <button 
                          onClick={handleCopyLogsToClipboard}
                          className="px-2.5 py-1 bg-slate-800 hover:bg-slate-700 text-[9px] rounded-lg font-bold text-white transition active:scale-95"
                        >
                          Sao chép Log
                        </button>
                        <button 
                          onClick={() => setIsConsoleOpen(false)}
                          className="px-2 py-0.5 bg-red-600/20 hover:bg-red-600/40 text-red-400 text-[9px] rounded-lg font-bold transition active:scale-95"
                        >
                          Đóng
                        </button>
                      </div>
                    </div>

                    {/* Logs Screen */}
                    <div className="flex-1 bg-black/50 border border-slate-900 rounded-2xl p-3 overflow-y-auto text-[10px] font-mono space-y-2 custom-scrollbar">
                      {syncLogs.length === 0 ? (
                        <div className="text-slate-500 text-center py-10">Chưa có hoạt động mạng nào.</div>
                      ) : (
                        syncLogs.map((log, idx) => (
                          <div key={idx} className="flex items-start gap-1.5">
                            <span className="text-slate-500 font-semibold flex-shrink-0">[{log.time}]</span>
                            <span className={log.type === 'error' ? 'text-red-400 font-semibold' : log.type === 'success' ? 'text-emerald-400 font-semibold' : 'text-slate-300'}>
                              {log.message}
                            </span>
                          </div>
                        ))
                      )}
                    </div>

                    <div className="mt-4 pt-3 border-t border-slate-900 text-[9px] text-slate-500 text-center leading-relaxed">
                      💡 Mẹo: Nhấn sao chép log này và gửi cho nhà phát triển nếu đồng bộ của bạn gặp bất cứ sự cố nào.
                    </div>
                  </div>
                </div>
              )}

              {/* === POP-UP THÔNG BÁO TÙY BIẾN === */}
              {alertModal.isOpen && (
                <div className="fixed inset-0 bg-slate-900/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm animate-fade-in">
                  <div className="bg-white rounded-[24px] shadow-2xl max-w-sm w-full overflow-hidden p-6 animate-in fade-in zoom-in-95 duration-150">
                    <h3 className="font-black text-red-600 text-sm mb-2 uppercase tracking-wide flex items-center gap-1">
                      <AlertCircle size={18} /> {alertModal.title}
                    </h3>
                    <p className="text-slate-600 text-xs mb-5 leading-relaxed bg-slate-50 p-3.5 rounded-2xl border border-slate-100 whitespace-pre-line">{alertModal.message}</p>
                    <div className="flex gap-2">
                      {alertModal.showConsoleBtn && (
                        <button 
                          onClick={() => {
                            setAlertModal(prev => ({ ...prev, isOpen: false }));
                            setIsConsoleOpen(true);
                          }}
                          className="flex-1 bg-indigo-50 hover:bg-indigo-100 text-indigo-600 font-extrabold py-2.5 rounded-xl text-xs transition active:scale-95"
                        >
                          Mở Console Log
                        </button>
                      )}
                      <button 
                        onClick={() => setAlertModal({ isOpen: false, message: '', title: '', showConsoleBtn: false })}
                        className="bg-slate-800 hover:bg-slate-900 text-white font-extrabold py-2.5 px-5 rounded-xl text-xs transition active:scale-95"
                      >
                        Đóng
                      </button>
                    </div>
                  </div>
                </div>
              )}

              {/* === POP-UP XÁC NHẬN TÙY BIẾN === */}
              {confirmModal.isOpen && (
                <div className="fixed inset-0 bg-slate-900/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                  <div className="bg-white rounded-[24px] shadow-2xl max-w-xs w-full overflow-hidden p-5 animate-in fade-in zoom-in-95 duration-150">
                    <h3 className="font-black text-slate-800 text-sm mb-1.5 uppercase tracking-wide">Xác nhận</h3>
                    <p className="text-slate-500 text-xs mb-5 leading-relaxed">{confirmModal.message}</p>
                    <div className="flex gap-2.5">
                      <button 
                        onClick={() => setConfirmModal({ isOpen: false, message: '', onConfirm: null })}
                        className="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-2.5 rounded-xl text-xs transition"
                      >
                        Hủy bỏ
                      </button>
                      <button 
                        onClick={confirmModal.onConfirm}
                        className="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-extrabold py-2.5 rounded-xl text-xs transition"
                      >
                        Đồng ý
                      </button>
                    </div>
                  </div>
                </div>
              )}

            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
