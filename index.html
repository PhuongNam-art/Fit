<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>App Tập Luyện Pro - Mobile Elo Edition</title>
    
    <!-- Tailwind CSS cho Giao diện -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel Biên dịch React trực tiếp -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Google Fonts Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        /* Tối ưu hóa chiều cao động trên Chrome di động và loại bỏ cuộn thừa */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #0f172a; /* Nền tối giả lập cho máy tính */
        }

        /* Chỉ khóa cuộn body ngoài trên chế độ mobile để ghim chặt bottom nav bar */
        @media (max-width: 767px) {
            html, body {
                overflow: hidden;
                position: fixed;
                width: 100%;
                height: 100dvh; /* Chiều cao thực tế bao gồm cả thanh URL */
            }
        }

        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
        .custom-scrollbar::-webkit-scrollbar { height: 4px; width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        
        /* Hiệu ứng mượt mà cho đổi tab và tương tác */
        .transition-all-200 {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body class="flex justify-center items-center min-h-screen">
    <div id="root" class="w-full max-w-md h-[100dvh] md:h-[840px] bg-slate-50 md:rounded-[40px] md:shadow-[0_25px_60px_-15px_rgba(0,0,0,0.5)] md:border-[12px] md:border-slate-800 overflow-hidden relative flex flex-col"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // ===========================================================================
        // 1. DÁN API KEY CỦA BẠN VÀO ĐÂY (Thay thế chuỗi dưới đây bằng Key thực tế của bạn)
        const HARDCODED_GEMINI_API_KEY = "AIzaSyB9oR7imw16wYMiqVLYShGuJBVgzbFFAu0";

        // 2. CẤU HÌNH TÊN MODEL GEMINI MUỐN SỬ DỤNG TẠI ĐÂY
        const HARDCODED_GEMINI_MODEL = "gemini-3.1-flash-lite";
        // ===========================================================================

        const DEFAULT_SHEET_URL = "https://script.google.com/macros/s/AKfycbyJcqcKxvmMkFcDfstKI211v1pUBkCvXpK59Fk3XjVwcN8G6R76rDYUQ_xiyg6n-YIIzw/exec"; 

        const IconBase = ({ children, size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
        );
        const Home = (p) => <IconBase {...p}><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></IconBase>;
        const CalendarIcon = (p) => <IconBase {...p}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></IconBase>;
        const Activity = (p) => <IconBase {...p}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></IconBase>;
        const Settings = (p) => <IconBase {...p}><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></IconBase>;
        const Plus = (p) => <IconBase {...p}><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></IconBase>;
        const Edit2 = (p) => <IconBase {...p}><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></IconBase>;
        const Trash2 = (p) => <IconBase {...p}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></IconBase>;
        const Save = (p) => <IconBase {...p}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></IconBase>;
        const AlertCircle = (p) => <IconBase {...p}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></IconBase>;
        const CheckCircle2 = (p) => <IconBase {...p}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></IconBase>;
        const Upload = (p) => <IconBase {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></IconBase>;
        const ChevronLeft = (p) => <IconBase {...p}><polyline points="15 18 9 12 15 6"></polyline></IconBase>;
        const ChevronRight = (p) => <IconBase {...p}><polyline points="9 18 15 12 9 6"></polyline></IconBase>;
        const Lock = (p) => <IconBase {...p}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></IconBase>;
        const LockOpen = (p) => <IconBase {...p}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 9.9-1"></path></IconBase>;
        const Award = (p) => <IconBase {...p}><circle cx="12" cy="8" r="7"></circle><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"></polyline></IconBase>;
        const RefreshCcw = (p) => <IconBase {...p}><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></IconBase>;
        const TerminalIcon = (p) => <IconBase {...p}><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></IconBase>;
        const Sparkles = (p) => <IconBase {...p}><path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-12.728l.707.707m11.314 11.314l.707.707M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8z"></path></IconBase>;

        const formatLocalDate = (d) => {
          const year = d.getFullYear();
          const month = String(d.getMonth() + 1).padStart(2, '0');
          const day = String(d.getDate()).padStart(2, '0');
          return `${year}-${month}-${day}`;
        };

        const parseLocalDate = (dateStr) => {
          if (!dateStr || typeof dateStr !== 'string') return new Date();
          const parts = dateStr.split('T')[0].split('-');
          if (parts.length !== 3) return new Date();
          const [year, month, day] = parts.map(Number);
          return new Date(year, month - 1, day);
        };

        const sanitizeCloudDate = (dateVal) => {
          if (!dateVal) return '';
          if (typeof dateVal === 'string') {
            if (dateVal.includes('T')) {
              try {
                const d = new Date(dateVal);
                if (!isNaN(d.getTime())) {
                  return formatLocalDate(d);
                }
              } catch (e) {}
              return dateVal.split('T')[0];
            }
            return dateVal.split(' ')[0];
          }
          try {
            const d = new Date(dateVal);
            if (!isNaN(d.getTime())) {
              return formatLocalDate(d);
            }
          } catch (e) {}
          return String(dateVal);
        };

        const sanitizeLocked = (val) => {
          if (typeof val === 'boolean') return val;
          if (typeof val === 'string') {
            return val.toLowerCase() === 'true';
          }
          return !!val;
        };

        // Danh mục bài tập gốc
        const MOCK_EXERCISES = [
          { id: 'E1', name: 'Hít đất cơ bản (Push-up)', target_value: 100, unit: 'rep', target_sets: 5, point: 10 },
          { id: 'E2', name: 'Ép ngực với dây (Band Fly)', target_value: 60, unit: 'rep', target_sets: 4, point: 5 },
          { id: 'E3', name: 'Hít xà đơn sấp tay (Pull-up)', target_value: 20, unit: 'rep', target_sets: 4, point: 10 },
          { id: 'E4', name: 'Đi bộ nhanh (Brisk Walking)', target_value: 30, unit: 'phút', target_sets: 1, point: 10 }
        ];

        function getMondayOfDate(d) {
          const date = typeof d === 'string' ? parseLocalDate(d) : new Date(d);
          const day = date.getDay();
          const diff = date.getDate() - day + (day === 0 ? -6 : 1);
          return new Date(date.setDate(diff));
        }

        function App() {
          const [activeTab, setActiveTab] = useState('dashboard');
          
          const loadData = (key, defaultData) => {
            const saved = localStorage.getItem(key);
            return saved ? JSON.parse(saved) : defaultData;
          };

          const isPullingRef = useRef(false);
          const hasAttemptedPullRef = useRef(false); 

          // === HỆ THỐNG LOG CONSOLE ĐỒNG BỘ ===
          const [syncLogs, setSyncLogs] = useState(() => [
            { time: new Date().toLocaleTimeString(), type: 'info', message: 'Ứng dụng khởi động. Sẵn sàng đồng bộ.' }
          ]);
          const [isConsoleOpen, setIsConsoleOpen] = useState(false);

          const logToConsole = (type, message) => {
            const time = new Date().toLocaleTimeString();
            setSyncLogs(prev => [{ time, type, message }, ...prev].slice(0, 50));
          };

          const [exercises, setExercises] = useState(() => loadData('ex_exercises', MOCK_EXERCISES));
          const [plans, setPlans] = useState(() => loadData('ex_plans', []));
          const [details, setDetails] = useState(() => loadData('ex_details', []));
          const [profile, setProfile] = useState(() => loadData('ex_profile', { weight: 90, height: 1.73 }));
          
          const [exForm, setExForm] = useState({ id: null, name: '', target_value: 100, unit: 'rep', target_sets: 3, point: 5 });
          
          const [selectedDate, setSelectedDate] = useState(() => formatLocalDate(new Date()));
          const [calendarMonth, setCalendarMonth] = useState(() => new Date());

          const [scheduleDraft, setScheduleDraft] = useState([]);
          const [editingDetailId, setEditingDetailId] = useState(null); 
          const [toast, setToast] = useState({ show: false, message: '' }); 

          const [alertModal, setAlertModal] = useState({ isOpen: false, message: '', title: 'Thông báo', showConsoleBtn: false });
          const [confirmModal, setConfirmModal] = useState({ isOpen: false, message: '', onConfirm: null });

          const [geminiApiKey, setGeminiApiKey] = useState(() => {
            const saved = loadData('gemini_api_key', '');
            return saved && saved !== "" ? saved : HARDCODED_GEMINI_API_KEY;
          });
          const [aiModal, setAiModal] = useState({ isOpen: false, isLoading: false, analysis: '', adjustments: [], newSuggestions: [] });
          
          const [selectedAdjIds, setSelectedAdjIds] = useState([]);
          const [selectedNewSugIndices, setSelectedNewSugIndices] = useState([]);

          const [sheetUrl, setSheetUrl] = useState(() => {
            const savedUrl = localStorage.getItem('sheet_api_url');
            return savedUrl && savedUrl !== "" ? savedUrl : DEFAULT_SHEET_URL;
          });
          const [syncStatus, setSyncStatus] = useState(null);
          const [isSyncing, setIsSyncing] = useState(false);

          const todayStr = formatLocalDate(new Date());

          const updateLocalTimestamp = () => {
            localStorage.setItem('ex_last_changed', Date.now().toString());
          };

          useEffect(() => { 
            localStorage.setItem('ex_exercises', JSON.stringify(exercises)); 
          }, [exercises]);

          useEffect(() => { 
            localStorage.setItem('ex_plans', JSON.stringify(plans)); 
          }, [plans]);

          useEffect(() => { 
            localStorage.setItem('ex_details', JSON.stringify(details)); 
          }, [details]);

          useEffect(() => { 
            localStorage.setItem('ex_profile', JSON.stringify(profile)); 
          }, [profile]);

          useEffect(() => {
            if (toast.show) {
              const timer = setTimeout(() => {
                setToast({ show: false, message: '' });
              }, 4000);
              return () => clearTimeout(timer);
            }
          }, [toast.show]);

          const calculatedEloAndHistory = useMemo(() => {
            let basePoints = 20; 
            let weeklyHistory = [];
            
            if (plans.length === 0) {
              return { currentPoints: 20, history: [] };
            }

            const sortedPlans = [...plans].sort((a, b) => a.date.localeCompare(b.date));
            const firstPlanDateStr = sortedPlans[0].date;
            
            const firstMonday = getMondayOfDate(firstPlanDateStr);
            const today = new Date();
            const currentMonday = getMondayOfDate(today);
            
            let iterMonday = new Date(firstMonday);

            while (iterMonday < currentMonday) {
              const weekStartStr = formatLocalDate(iterMonday);
              const iterSunday = new Date(iterMonday);
              iterSunday.setDate(iterSunday.getDate() + 6);
              const weekEndStr = formatLocalDate(iterSunday);

              const weekPlans = plans.filter(p => p.date >= weekStartStr && p.date <= weekEndStr);
              
              let totalTargetReps = 0;
              let totalActualReps = 0;
              let hasPlans = weekPlans.length > 0;

              weekPlans.forEach(p => {
                const planDetails = details.filter(d => d.plan_id === p.id);
                planDetails.forEach(d => {
                  totalTargetReps += Number(d.target_reps || 0);
                  totalActualReps += Number(d.actual_reps || 0);
                });
              });

              let completionRate = 0;
              let eloChange = 0;
              let statusLabel = 'Không Hoạt Động';

              if (hasPlans) {
                if (totalTargetReps > 0) {
                  completionRate = Math.min(100, Math.round((totalActualReps / totalTargetReps) * 100));
                  if (completionRate > 90) {
                    eloChange = 5;
                    statusLabel = 'Tốt (>90%)';
                  } else if (completionRate < 80) {
                    eloChange = -5;
                    statusLabel = 'Yếu (<80%)';
                  } else {
                    eloChange = 0;
                    statusLabel = 'Đạt (80% - 90%)';
                  }
                } else {
                  completionRate = 0;
                  eloChange = -5;
                  statusLabel = 'Yếu (<80%)';
                }
              } else {
                completionRate = 0;
                eloChange = -5;
                statusLabel = 'Không xếp lịch';
              }

              const previousElo = basePoints;
              basePoints = Math.max(20, basePoints + eloChange); 

              weeklyHistory.push({
                weekStart: weekStartStr,
                weekEnd: weekEndStr,
                completionRate,
                status: statusLabel,
                change: eloChange,
                previousPoints: previousElo,
                finalPoints: basePoints,
                hasPlans
              });

              iterMonday.setDate(iterMonday.getDate() + 7);
            }

            return {
              currentPoints: basePoints,
              history: weeklyHistory.reverse()
            };
          }, [plans, details]);

          const userPointsLimit = calculatedEloAndHistory.currentPoints;

          const rankInfo = useMemo(() => {
            const pts = userPointsLimit;
            if (pts >= 75) return { name: 'Cao Thủ', icon: '🔥', color: 'from-purple-600 to-rose-600 shadow-rose-300', nextThreshold: null, prevThreshold: 75 };
            if (pts >= 65) return { name: 'Kim Cương', icon: '❄️', color: 'from-blue-400 to-indigo-600 shadow-blue-300', nextThreshold: 75, prevThreshold: 65 };
            if (pts >= 55) return { name: 'Bạch Kim', icon: '💎', color: 'from-cyan-400 to-teal-500 shadow-cyan-300', nextThreshold: 65, prevThreshold: 55 };
            if (pts >= 45) return { name: 'Vàng', icon: '🥇', color: 'from-yellow-400 to-amber-500 shadow-yellow-200', nextThreshold: 55, prevThreshold: 45 };
            if (pts >= 35) return { name: 'Bạc', icon: '🥈', color: 'from-slate-300 to-slate-500 shadow-slate-200', nextThreshold: 45, prevThreshold: 35 };
            return { name: 'Đồng', icon: '🥉', color: 'from-amber-600 to-amber-800 shadow-amber-700/20', nextThreshold: 35, prevThreshold: 20 };
          }, [userPointsLimit]);

          const activePlan = useMemo(() => {
            return plans.find(p => p.date === selectedDate);
          }, [plans, selectedDate]);

          const activeDetails = useMemo(() => {
            if (!activePlan) return [];
            return details.filter(d => d.plan_id === activePlan.id);
          }, [details, activePlan]);

          const currentPoints = useMemo(() => {
            return activeDetails.reduce((sum, d) => {
              const ex = exercises.find(e => e.id === d.exercise_id);
              return sum + (ex ? Number(ex.point) : 0);
            }, 0);
          }, [activeDetails, exercises]);

          const draftTotalPoints = useMemo(() => {
            return scheduleDraft.reduce((sum, item) => {
              const ex = exercises.find(e => e.id === item.exercise_id);
              return sum + (ex ? Number(ex.point) : 0);
            }, 0);
          }, [scheduleDraft, exercises]);

          const activeCompletionRate = useMemo(() => {
            if (activeDetails.length === 0) return 0;
            let totalTarget = 0; let totalActual = 0;
            activeDetails.forEach(d => {
              totalTarget += Number(d.target_reps || 0);
              totalActual += Number(d.actual_reps || 0);
            });
            return totalTarget === 0 ? 0 : Math.min(100, Math.round((totalActual / totalTarget) * 100));
          }, [activeDetails]);

          const currentBMI = useMemo(() => {
            if (profile.weight && profile.height) {
              return (profile.weight / (profile.height * profile.height)).toFixed(2);
            }
            return '--';
          }, [profile.weight, profile.height]);

          const handleProfileChange = (field, value) => {
            updateLocalTimestamp();
            setProfile(prev => ({ ...prev, [field]: Number(value) }));
          };

          useEffect(() => {
            if (!activePlan) {
              setScheduleDraft([]);
            }
          }, [selectedDate, activePlan]);

          const calendarDays = useMemo(() => {
            const year = calendarMonth.getFullYear();
            const month = calendarMonth.getMonth();
            
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            
            const daysInMonth = lastDay.getDate();
            const startDayOfWeek = firstDay.getDay();

            const offset = startDayOfWeek === 0 ? 6 : startDayOfWeek - 1;

            const daysArr = [];

            for (let i = 0; i < offset; i++) {
              const prevDate = new Date(year, month, -offset + i + 1);
              daysArr.push({ date: prevDate, isCurrentMonth: false });
            }

            for (let i = 1; i <= daysInMonth; i++) {
              daysArr.push({ date: new Date(year, month, i), isCurrentMonth: true });
            }

            const remaining = 42 - daysArr.length;
            for (let i = 1; i <= remaining; i++) {
              daysArr.push({ date: new Date(year, month + 1, i), isCurrentMonth: false });
            }

            return daysArr;
          }, [calendarMonth]);

          const prevMonth = () => {
            setCalendarMonth(new Date(calendarMonth.getFullYear(), calendarMonth.getMonth() - 1, 1));
          };
          const nextMonth = () => {
            setCalendarMonth(new Date(calendarMonth.getFullYear(), calendarMonth.getMonth() + 1, 1));
          };

          const handleExFormChange = (e) => {
            const { name, value } = e.target;
            setExForm(prev => ({ ...prev, [name]: (name === 'name' || name === 'unit') ? value : Number(value) }));
          };

          const saveExercise = (e) => {
            e.preventDefault();
            updateLocalTimestamp();
            if (exForm.id) {
              setExercises(exercises.map(ex => ex.id === exForm.id ? { ...exForm } : ex));
            } else {
              setExercises([...exercises, { ...exForm, id: 'E_' + Date.now() }]);
            }
            setExForm({ id: null, name: '', target_value: 100, unit: 'rep', target_sets: 3, point: 5 });
            setAlertModal({ isOpen: true, title: 'Thành công', message: 'Đã cập nhật danh mục bài tập!' });
          };

          const editExercise = (ex) => {
            setExForm({ ...ex });
          };

          const deleteExercise = (id) => {
            setConfirmModal({
              isOpen: true,
              message: "Bạn có chắc chắn muốn xóa bài tập này khỏi danh sách chung?",
              onConfirm: () => {
                updateLocalTimestamp();
                setExercises(exercises.filter(ex => ex.id !== id));
                setConfirmModal({ isOpen: false, message: '', onConfirm: null });
              }
            });
          };

          const addExerciseToDraft = (exerciseId) => {
            const ex = exercises.find(e => e.id === exerciseId);
            if (!ex) return;

            if (scheduleDraft.some(item => item.exercise_id === exerciseId)) {
              setAlertModal({ isOpen: true, title: 'Thông báo', message: 'Bài tập này đã có trong danh sách xếp lịch!' });
              return;
            }

            if (draftTotalPoints + ex.point > userPointsLimit) {
              setAlertModal({ 
                isOpen: true, 
                title: 'Giới Hạn Elo Chặn Lại', 
                message: `Lịch tập ngày này vượt giới hạn Point sức mạnh Elo hiện tại của bạn (${userPointsLimit} pts). Hoàn thành thật tốt tuần này để được tăng giới hạn Point tuần sau!` 
              });
              return;
            }

            setScheduleDraft([...scheduleDraft, {
              exercise_id: ex.id,
              target_reps: ex.target_value,
              target_sets: ex.target_sets
            }]);
          };

          const updateDraftValue = (exerciseId, field, value) => {
            setScheduleDraft(scheduleDraft.map(item => {
              if (item.exercise_id === exerciseId) {
                return { ...item, [field]: Number(value) };
              }
              return item;
            }));
          };

          const removeExerciseFromDraft = (exerciseId) => {
            setScheduleDraft(scheduleDraft.filter(item => item.exercise_id !== exerciseId));
          };

          const handleSaveAndLockPlan = () => {
            if (scheduleDraft.length === 0) {
              setAlertModal({ isOpen: true, title: 'Lỗi xếp lịch', message: 'Vui lòng chọn ít nhất 1 bài tập trước khi lưu!' });
              return;
            }

            setConfirmModal({
              isOpen: true,
              message: `Xác nhận lưu và khóa lịch tập cho ngày ${selectedDate}? Sau khi khóa, bạn sẽ KHÔNG thể thay đổi các bài tập hoặc mục tiêu nữa, chỉ có thể nhập kết quả thực hành để thăng hạng Elo!`,
              onConfirm: () => {
                updateLocalTimestamp();
                const planId = 'P_' + Date.now();
                
                const newPlan = {
                  id: planId,
                  date: selectedDate,
                  total_point_limit: userPointsLimit,
                  locked: true 
                };

                const newDetails = scheduleDraft.map(item => ({
                  id: 'D_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
                  plan_id: planId,
                  exercise_id: item.exercise_id,
                  target_reps: item.target_reps,
                  actual_reps: 0,
                  target_sets: item.target_sets,
                  actual_sets: 0
                }));

                setPlans(prev => [...prev, newPlan]);
                setDetails(prev => [...prev, ...newDetails]);
                setConfirmModal({ isOpen: false, message: '', onConfirm: null });
                setAlertModal({ isOpen: true, title: 'Đã khóa lịch tập', message: 'Lịch tập đã bắt đầu! Hãy chăm chỉ tập luyện và ghi nhận con số thực tế.' });
              }
            });
          };

          const updateActualSets = (detailId, value) => {
            const numSets = value === '' ? 0 : Number(value);
            updateLocalTimestamp();
            
            setDetails(prevDetails => {
              return prevDetails.map(d => {
                if (d.id === detailId) {
                  const oldSets = Number(d.actual_sets || 0);
                  if (oldSets !== 0 && oldSets !== numSets && value !== "") {
                    setToast({
                      show: true,
                      message: "Bạn đang chỉnh lại số Set thực tế, hãy nhớ trung thực nhé. 💪"
                    });
                  }

                  // Quy đổi: reps_per_set = target_reps / target_sets
                  const targetSets = Number(d.target_sets || 1);
                  const targetReps = Number(d.target_reps || 0);
                  const repsPerSet = targetSets > 0 ? (targetReps / targetSets) : 0;
                  const calculatedReps = Math.round(numSets * repsPerSet);

                  return { 
                    ...d, 
                    actual_sets: numSets,
                    actual_reps: calculatedReps
                  };
                }
                return d;
              });
            });
          };

          const syncPush = async (showSuccessAlert = true) => {
            if (!sheetUrl || (sheetUrl === DEFAULT_SHEET_URL && sheetUrl.includes("XXXXXX"))) {
              logToConsole('info', 'Chưa cấu hình Google Sheets URL. Skip tự động PUSH.');
              return;
            }
            setIsSyncing(true); setSyncStatus(null);
            logToConsole('info', 'Khởi chạy PUSH dữ liệu lên Google Sheets...');
            
            try {
              const localTimestamp = localStorage.getItem('ex_last_changed') || Date.now().toString();
              const payload = { 
                action: 'sync_push', 
                data: { 
                  Exercises: exercises,
                  WorkoutPlans: plans,
                  WorkoutDetails: details,
                  UserProfile: profile,
                  last_changed: localTimestamp 
                } 
              };

              logToConsole('info', `Kích thước payload gửi đi: ~${JSON.stringify(payload).length} bytes. Đang gọi API...`);

              const response = await fetch(sheetUrl, { 
                method: 'POST', 
                mode: 'no-cors', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify(payload) 
              });

              logToConsole('success', 'PUSH hoàn thành thành công (Trình duyệt gửi no-cors nên không có body phản hồi).');

              if (showSuccessAlert) {
                setSyncStatus({ type: 'success', msg: 'Đã lưu trữ dữ liệu lên Google Sheets!' });
              }
            } catch (err) {
              logToConsole('error', `PUSH THẤT BẠI: ${err.message || err.toString()}`);
              setSyncStatus({ type: 'error', msg: 'Lỗi đồng bộ dữ liệu lên Sheets!' });
            }
            setIsSyncing(false); 
            if (showSuccessAlert) setTimeout(() => setSyncStatus(null), 3000);
          };

          const syncPull = async (isAuto = false) => {
            if (!sheetUrl || (sheetUrl === DEFAULT_SHEET_URL && sheetUrl.includes("XXXXXX"))) {
              hasAttemptedPullRef.current = true;
              logToConsole('info', 'Chưa cấu hình Google Sheets URL. Skip tự động PULL.');
              return;
            }
            setIsSyncing(true); setSyncStatus(null);
            logToConsole('info', `Khởi chạy PULL dữ liệu từ URL: ${sheetUrl}`);
            
            try {
              const res = await fetch(`${sheetUrl}?action=sync_pull`);
              logToConsole('info', `Kết nối API thành công. HTTP Status: ${res.status}`);
              
              if (!res.ok) {
                throw new Error("HTTP Status Error: " + res.status);
              }
              
              const json = await res.json();
              logToConsole('info', `Đã Parse JSON phản hồi. Status nhận được: ${json.status}`);
              
              if (json.status === 'success' && json.data) {
                const cloudExercisesRaw = json.data.Exercises || json.data.exercises || [];
                const cloudPlansRaw = json.data.WorkoutPlans || json.data.plans || [];
                const cloudDetailsRaw = json.data.WorkoutDetails || json.data.details || [];
                const cloudProfileRaw = json.data.UserProfile || json.data.profile || null;
                const cloudTime = Number(json.data.last_changed || json.data.lastChanged || 0);

                logToConsole('info', `Dữ liệu từ Cloud: Exercises(${cloudExercisesRaw.length}), Plans(${cloudPlansRaw.length}), Details(${cloudDetailsRaw.length}), LastChanged(${cloudTime})`);

                const cloudExercises = cloudExercisesRaw.map(ex => ({
                  ...ex,
                  target_value: Number(ex.target_value || 0),
                  target_sets: Number(ex.target_sets || 0),
                  point: Number(ex.point || 0)
                }));

                const cloudPlans = cloudPlansRaw.map(p => ({
                  ...p,
                  date: sanitizeCloudDate(p.date),
                  locked: sanitizeLocked(p.locked),
                  total_point_limit: Number(p.total_point_limit || 20)
                }));

                const cloudDetails = cloudDetailsRaw.map(d => ({
                  ...d,
                  target_reps: Number(d.target_reps || 0),
                  actual_reps: Number(d.actual_reps || 0),
                  target_sets: Number(d.target_sets || 0),
                  actual_sets: Number(d.actual_sets || 0)
                }));

                const cloudProfile = cloudProfileRaw ? (Array.isArray(cloudProfileRaw) ? (cloudProfileRaw[0] || { weight: 90, height: 1.73 }) : cloudProfileRaw) : null;
                const parsedProfile = cloudProfile ? {
                  weight: Number(cloudProfile.weight || 90),
                  height: Number(cloudProfile.height || 1.73)
                } : { weight: 90, height: 1.73 };

                const localTime = Number(localStorage.getItem('ex_last_changed') || '0');
                logToConsole('info', `Kiểm tra Timestamp: Cloud (${cloudTime}) vs Local (${localTime})`);

                const hasCloudData = cloudPlans.length > 0 || cloudDetails.length > 0;
                const hasLocalData = plans.length > 0 || details.length > 0;

                if (cloudTime > localTime && hasCloudData) {
                  isPullingRef.current = true;
                  logToConsole('success', 'Dữ liệu Cloud mới hơn! Cập nhật máy của bạn...');
                  
                  setExercises(cloudExercises);
                  setPlans(cloudPlans);
                  setDetails(cloudDetails);
                  setProfile(parsedProfile);
                  
                  localStorage.setItem('ex_exercises', JSON.stringify(cloudExercises));
                  localStorage.setItem('ex_plans', JSON.stringify(cloudPlans));
                  localStorage.setItem('ex_details', JSON.stringify(cloudDetails));
                  localStorage.setItem('ex_profile', JSON.stringify(parsedProfile));
                  localStorage.setItem('ex_last_changed', cloudTime.toString());

                  setTimeout(() => {
                    isPullingRef.current = false;
                  }, 300);

                  setSyncStatus({ 
                    type: 'success', 
                    msg: isAuto ? 'Đã tự động tải dữ liệu mới từ Cloud!' : 'Đã tải thành công dữ liệu về máy!' 
                  });
                } 
                else if (localTime > cloudTime && hasLocalData) {
                  logToConsole('info', 'Dữ liệu máy mới hơn Cloud! Tiến hành ghi đè dữ liệu lên Cloud...');
                  setSyncStatus({ type: 'success', msg: 'Khởi chạy đồng bộ dữ liệu máy lên Cloud...' });
                  await syncPush(false);
                }
                else if (cloudTime === localTime && hasCloudData) {
                  logToConsole('info', 'Hai bên cân bằng dữ liệu.');
                  isPullingRef.current = true;
                  setExercises(cloudExercises);
                  setPlans(cloudPlans);
                  setDetails(cloudDetails);
                  setProfile(parsedProfile);
                  setTimeout(() => {
                    isPullingRef.current = false;
                  }, 300);
                }
                else if (!hasCloudData && hasLocalData) {
                  logToConsole('info', 'Dữ liệu máy có nhưng Cloud rỗng hoàn toàn. Tiến hành sao lưu toàn bộ lên Cloud...');
                  setSyncStatus({ type: 'success', msg: 'Khởi tạo sao lưu đám mây...' });
                  await syncPush(false);
                }
              } else {
                throw new Error(json.message || "Không thể tải cấu trúc JSON hoặc Cloud đang rỗng.");
              }
            } catch (err) {
              logToConsole('error', `PULL THẤT BẠI: ${err.message || err.toString()}`);
              if (!isAuto) {
                setSyncStatus({ type: 'error', msg: 'Không thể nạp dữ liệu từ Cloud!' });
                setAlertModal({
                  isOpen: true,
                  title: 'ĐỒNG BỘ THẤT BẠI 🔴',
                  message: `Lỗi kết nối xảy ra: ${err.message || err.toString()}\nHãy bấm nút ">_" trên Header để xem chi tiết log hoặc kiểm tra phân quyền Google Web App của bạn!`,
                  showConsoleBtn: true
                });
              }
            }
            
            hasAttemptedPullRef.current = true;
            setIsSyncing(false); 
            setTimeout(() => setSyncStatus(null), 4000);
          };

          const handleCopyLogsToClipboard = () => {
            const rawLogs = syncLogs.map(l => `[${l.time}] [${l.type.toUpperCase()}] ${l.message}`).join('\n');
            const el = document.createElement('textarea');
            el.value = rawLogs;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            setToast({ show: true, message: 'Đã sao chép Log Console vào bộ nhớ tạm! 📋' });
          };

          const runGeminiAnalysis = async () => {
            if (!geminiApiKey || geminiApiKey.trim() === "") {
              setAlertModal({
                isOpen: true,
                title: 'Thiếu API Key 🔑',
                message: 'Vui lòng truy cập tab "Cài đặt" (Bánh răng) và nhập Gemini API Key của bạn để sử dụng tính năng thông minh này!'
              });
              return;
            }

            setAiModal({ isOpen: true, isLoading: true, analysis: '', adjustments: [], newSuggestions: [] });
            setSelectedAdjIds([]);
            setSelectedNewSugIndices([]);
            logToConsole('info', 'Bắt đầu kết nối với Gemini AI...');

            const bmi = currentBMI;
            const prompt = `
              Bạn là một chuyên gia huấn luyện viên thể hình Calisthenics & Y khoa. 
              Hãy phân tích chỉ số cơ thể của hội viên:
              - Chiều cao: ${profile.height}m
              - Cân nặng: ${profile.weight}kg
              - BMI: ${bmi} (Béo phì nhẹ, nhưng có nền tảng tập gym 5 năm, khối lượng cơ bắp cực lớn 38kg).
              - Thiết bị: Chỉ có XÀ ĐƠN + DÂY KHÁNG LỰC + BODYWEIGHT.
              - Mục tiêu: Giảm mỡ an toàn, bảo vệ tối đa khớp cổ tay, cùi chỏ và khớp gối khi vận động cường độ cao.

              Dưới đây là danh sách bài tập hiện tại của hội viên:
              ${JSON.stringify(exercises, null, 2)}

              Nhiệm vụ của bạn:
              1. ĐỐI VỚI BÀI TẬP HIỆN TẠI: Đề xuất điều chỉnh số lượng mục tiêu (target_value), số sets (target_sets) và số điểm thưởng (point) cho từng bài tập sao cho an toàn cho thể trạng nặng 90kg. Giữ nguyên ID gốc và tuyệt đối KHÔNG ĐỔI TÊN (name) hay ĐƠN VỊ (unit) của bài tập hiện tại.
              2. ĐỀ XUẤT THÊM BÀI TẬP MỚI (Tối đa 2-3 bài tập): Đề xuất thêm các bài tập mới thích hợp (ưu tiên Cardio an toàn cho khớp như đi bộ nhanh, hoặc bài tập bổ trợ mông đùi/bụng/lưng bằng dây kháng lực và xà đơn).
              3. ĐẶC BIỆT QUAN TRỌNG: Tất cả giá trị điểm số "point" của các bài tập (cả điều chỉnh và thêm mới) BẮT BUỘC PHẢI LÀ BỘI SỐ CỦA 5 (chỉ chọn một trong các mốc điểm chuẩn: 5, 10, 15, hoặc 20 point). Tuyệt đối không để điểm lẻ (như 2, 3, 4, 6, 8, 12, ...).
              
              Phản hồi hoàn toàn bằng cấu trúc dữ liệu JSON thuần túy dưới đây (không bọc trong thẻ markdown, không viết thêm bất kỳ văn bản giải thích thừa thãi nào ngoài JSON):
              {
                "analysis": "Lời khuyên y khoa/thể hình ngắn gọn tầm 3-4 câu tập trung vào việc bảo vệ khớp và phân bổ lực kéo/đẩy phù hợp với BMI hiện tại.",
                "adjustments": [
                  {
                    "id": "id của bài tập hiện tại tương ứng",
                    "target_value": số_rep_hoặc_thời_gian_mới,
                    "target_sets": số_set_mới,
                    "point": số_point_mới_bội_số_của_5
                  }
                ],
                "new_suggestions": [
                  {
                    "name": "Tên bài tập mới gợi ý bằng tiếng Việt đầy đủ",
                    "target_value": số_rep_hoặc_thời_gian,
                    "unit": "đơn vị đo phù hợp như rep/giây/phút",
                    "target_sets": số_set,
                    "point": số_point_bội_số_của_5
                  }
                ]
              }
            `;

            try {
              const activeModel = HARDCODED_GEMINI_MODEL || "gemini-3.1-flash-lite";
              logToConsole('info', `Đang gọi API với Model: ${activeModel}...`);

              const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${activeModel}:generateContent?key=${geminiApiKey}`, {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                  contents: [{
                    parts: [{ text: prompt }]
                  }],
                  generationConfig: {
                    responseMimeType: "application/json"
                  }
                })
              });

              if (!response.ok) {
                throw new Error(`Google API returned status ${response.status}`);
              }

              const resJson = await response.json();
              const textResponse = resJson.candidates[0].content.parts[0].text;
              const parsedResult = JSON.parse(textResponse);

              const adjs = parsedResult.adjustments || [];
              const newSugs = parsedResult.new_suggestions || [];

              setAiModal({
                isOpen: true,
                isLoading: false,
                analysis: parsedResult.analysis,
                adjustments: adjs,
                newSuggestions: newSugs
              });

              // Mặc định chọn tất cả các đề xuất của AI
              setSelectedAdjIds(adjs.map(a => a.id));
              setSelectedNewSugIndices(newSugs.map((_, idx) => idx));

              logToConsole('success', 'Gemini AI phân tích và tối ưu hóa hệ điểm cơ số 5 thành công.');
            } catch (err) {
              logToConsole('error', `LỖI PHÂN TÍCH AI: ${err.message || err.toString()}`);
              setAiModal(prev => ({ ...prev, isOpen: false, isLoading: false }));
              setAlertModal({
                isOpen: true,
                title: 'Lỗi Kết Nối Gemini AI 🔴',
                message: `Đã xảy ra lỗi khi gọi trí tuệ nhân tạo: ${err.message || err.toString()}\nVui lòng kiểm tra lại tính chính xác của Gemini API Key trong Cài đặt!`
              });
            }
          };

          const applyAiAdjustments = () => {
            updateLocalTimestamp();
            setExercises(prevExercises => {
              // 1. Chỉ áp dụng các thay đổi cho các bài tập cũ được người dùng lựa chọn chọn
              let updated = prevExercises.map(ex => {
                const isSelected = selectedAdjIds.includes(ex.id);
                if (isSelected) {
                  const adj = aiModal.adjustments.find(a => a.id === ex.id);
                  if (adj) {
                    return {
                      ...ex,
                      target_value: Number(adj.target_value || ex.target_value),
                      target_sets: Number(adj.target_sets || ex.target_sets),
                      point: Number(adj.point || ex.point)
                    };
                  }
                }
                return ex;
              });

              // 2. Chỉ thêm mới các bài tập được đề xuất và được lựa chọn
              const selectedNewExs = aiModal.newSuggestions
                .filter((_, idx) => selectedNewSugIndices.includes(idx))
                .map((newEx, idx) => ({
                  id: 'E_AI_' + Date.now() + '_' + idx,
                  name: newEx.name,
                  target_value: Number(newEx.target_value),
                  unit: newEx.unit || 'rep',
                  target_sets: Number(newEx.target_sets),
                  point: Number(newEx.point)
                }));

              return [...updated, ...selectedNewExs];
            });

            setAiModal({ isOpen: false, isLoading: false, analysis: '', adjustments: [], newSuggestions: [] });
            setSelectedAdjIds([]);
            setSelectedNewSugIndices([]);
            
            setAlertModal({
              isOpen: true,
              title: 'Cập Nhật Thành Công 🎉',
              message: 'Đã hoàn tất điều chỉnh an toàn khớp cho các bài tập được lựa chọn từ HLV AI!'
            });
          };

          useEffect(() => {
            if (sheetUrl && sheetUrl !== "" && !sheetUrl.includes("XXXXXX")) {
              syncPull(true);
            } else {
              hasAttemptedPullRef.current = true; 
            }
          }, []);

          useEffect(() => {
            if (!hasAttemptedPullRef.current) return;
            if (isPullingRef.current) return; 
            
            const delayDebounceFn = setTimeout(() => {
              syncPush(false);
            }, 3000);
            return () => clearTimeout(delayDebounceFn);
          }, [exercises, plans, details, profile]);

          return (
            <div className="flex flex-col h-full bg-slate-50 relative overflow-hidden select-none">
              
              {toast.show && (
                <div className="absolute top-16 left-4 right-4 bg-amber-500 text-white px-4 py-3.5 rounded-2xl shadow-xl z-50 flex items-center gap-2 border border-amber-400/30 animate-in fade-in slide-in-from-top-4 duration-200">
                  <AlertCircle size={18} className="flex-shrink-0 animate-pulse text-amber-50" />
                  <p className="text-xs font-bold leading-snug">{toast.message}</p>
                </div>
              )}

              {/* HEADER DI ĐỘNG CAO CẤP */}
              <header className="bg-gradient-to-r from-slate-900 to-indigo-950 text-white px-4 py-4 pt-6 shadow-md flex justify-between items-center z-10 flex-shrink-0">
                <div>
                  <h1 className="text-lg font-black tracking-tight flex items-center gap-1.5 uppercase">
                    <span className="bg-indigo-600 text-white px-1.5 py-0.5 rounded text-xs font-black tracking-wider">ELO</span>
                    App Tập Luyện
                  </h1>
                  <p className="text-indigo-200 text-[10px] mt-0.5">Mobile Pro • Level & Rank Tracker</p>
                </div>
                
                <div className="flex gap-2">
                  <button onClick={() => setIsConsoleOpen(true)} className="p-2 bg-slate-800 text-yellow-300 rounded-xl hover:bg-slate-700 active:scale-95 transition" title="Xem Nhật Ký Log Hệ Thống">
                    <TerminalIcon size={16} />
                  </button>
                  <button onClick={() => syncPull(false)} disabled={isSyncing} className="p-2 bg-indigo-800/40 rounded-xl hover:bg-indigo-900/60 transition active:scale-95" title="Tải về từ Cloud">
                    <RefreshCcw size={16} className={isSyncing ? 'animate-spin text-yellow-300' : ''} />
                  </button>
                  <button onClick={() => syncPush(true)} disabled={isSyncing} className="p-2 bg-indigo-800/40 rounded-xl hover:bg-indigo-900/60 transition active:scale-95" title="Đẩy thủ công lên Cloud">
                    <Upload size={16} className={isSyncing ? 'opacity-50' : ''} />
                  </button>
                </div>
              </header>

              {/* THÔNG BÁO ĐỒNG BỘ */}
              {syncStatus && (
                <div 
                  onClick={() => setIsConsoleOpen(true)}
                  className="p-2 text-xs font-semibold flex items-center justify-center gap-1.5 transition duration-300 cursor-pointer bg-emerald-500 text-white flex-shrink-0"
                >
                  {syncStatus.type === 'error' ? <AlertCircle size={14} /> : <CheckCircle2 size={14} />}
                  {syncStatus.msg} {syncStatus.type === 'error' && '(Chạm để xem Nhật Ký)'}
                </div>
              )}

              {/* KHU VỰC CUỘN NỘI DUNG CHÍNH (Chiếm trọn vùng còn lại và tự cuộn) */}
              {}
              <main className="flex-1 overflow-y-auto p-4 space-y-4 custom-scrollbar pb-24">
                
                {/* TAB 1: TỔNG QUAN TẬP LUYỆN */}
                {activeTab === 'dashboard' && (
                  <div className="space-y-4 animate-in fade-in duration-200">
                    <div className="flex justify-between items-center">
                      <h2 className="text-xl font-bold text-slate-800">Thống kê Hôm nay</h2>
                      <span className="text-xs font-bold bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full">{todayStr}</span>
                    </div>

                    {/* Khung Rank hiện tại cực đỉnh */}
                    <div className={`bg-gradient-to-r ${rankInfo.color} p-4 rounded-3xl shadow-lg text-white relative overflow-hidden`}>
                      <div className="absolute right-2 -bottom-2 text-8xl opacity-15">
                        {rankInfo.icon}
                      </div>
                      <div className="flex justify-between items-start">
                        <div>
                          <span className="text-white/80 text-[10px] font-bold tracking-widest uppercase">Xếp hạng Sức mạnh (Elo)</span>
                          <h3 className="text-3xl font-black tracking-tight flex items-center gap-2 mt-1">
                            {rankInfo.name} <span className="text-2xl">{rankInfo.icon}</span>
                          </h3>
                        </div>
                        <div className="bg-white/20 backdrop-blur-md px-3 py-1.5 rounded-2xl text-center">
                          <span className="block text-[8px] uppercase font-bold text-indigo-100">Point Tuần này</span>
                          <span className="text-lg font-black">{userPointsLimit} Pts</span>
                        </div>
                      </div>

                      {/* Tiến trình lên hạng */}
                      {rankInfo.nextThreshold && (
                        <div className="mt-5">
                          <div className="flex justify-between text-[10px] font-bold mb-1">
                            <span>Bậc tiếp theo: {rankInfo.nextThreshold} Pts</span>
                            <span>{userPointsLimit} / {rankInfo.nextThreshold}</span>
                          </div>
                          <div className="w-full bg-black/25 h-2 rounded-full overflow-hidden">
                            <div 
                              className="bg-white h-full rounded-full transition-all duration-500" 
                              style={{ width: `${Math.min(100, ((userPointsLimit - rankInfo.prevThreshold) / (rankInfo.nextThreshold - rankInfo.prevThreshold)) * 100)}%` }}
                            ></div>
                          </div>
                        </div>
                      )}
                    </div>

                    {/* Chỉ số nhanh */}
                    <div className="grid grid-cols-2 gap-3">
                      <div className="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex flex-col justify-between">
                        <span className="text-slate-400 text-xs font-medium">Hoàn thành hôm nay</span>
                        <div className="mt-2 flex items-baseline gap-1">
                          <span className="text-3xl font-black text-emerald-500">{activeCompletionRate}%</span>
                        </div>
                        <div className="w-full bg-slate-100 h-1.5 rounded-full mt-2">
                          <div className="bg-emerald-500 h-1.5 rounded-full" style={{ width: `${activeCompletionRate}%` }}></div>
                        </div>
                      </div>

                      <div className="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex flex-col justify-between">
                        <span className="text-slate-400 text-xs font-medium">Chỉ số BMI cơ thể</span>
                        <div className="mt-2">
                          <p className="text-3xl font-black text-indigo-900">{currentBMI}</p>
                          <p className="text-[10px] text-slate-500 mt-1">{profile.weight}kg • {profile.height}m</p>
                        </div>
                      </div>
                    </div>

                    {/* Danh sách bài tập trên Dashboard */}
                    <div className="bg-white rounded-2xl p-4 shadow-sm border border-slate-100">
                      <h3 className="font-bold text-slate-800 text-sm mb-3">Danh sách bài tập hôm nay</h3>
                      {activeDetails.length === 0 ? (
                        <div className="text-center py-8 text-slate-400">
                          <Activity size={36} className="mx-auto mb-2 opacity-25 text-indigo-500" />
                          <p className="text-xs">Chưa có lịch tập hôm nay.</p>
                          <button onClick={() => setActiveTab('plan')} className="mt-3 text-xs bg-indigo-50 text-indigo-600 font-bold px-4 py-2 rounded-full">
                            Thiết lập Lịch Tập Ngay
                          </button>
                        </div>
                      ) : (
                        <div className="space-y-3">
                          {activeDetails.map(d => {
                            const ex = exercises.find(e => e.id === d.exercise_id);
                            if (!ex) return null;
                            const rate = d.target_reps ? Math.min(100, Math.round((d.actual_reps / d.target_reps) * 100)) : 0;
                            const isEditing = editingDetailId === d.id;
                            return (
                              <div 
                                key={d.id} 
                                onClick={() => setEditingDetailId(isEditing ? null : d.id)}
                                className={`p-3 rounded-xl border transition-all duration-200 cursor-pointer ${isEditing ? 'bg-indigo-50/40 border-indigo-200 shadow-sm' : 'bg-slate-50 border-slate-100 hover:bg-slate-100/50'}`}
                              >
                                <div className="flex justify-between items-center mb-1.5">
                                  <span className="font-bold text-xs text-slate-700">{ex.name}</span>
                                  <span className="text-xs font-bold text-slate-600">{d.actual_reps}/{d.target_reps} {ex.unit}</span>
                                </div>
                                <div className="w-full bg-slate-200 h-2 rounded-full overflow-hidden">
                                  <div className="bg-indigo-600 h-full rounded-full transition-all duration-300" style={{ width: `${rate}%` }}></div>
                                </div>
                                <div className="flex justify-between text-[10px] text-slate-400 mt-1">
                                  <span>Số Set: {d.actual_sets}/{d.target_sets} Sets</span>
                                  <span>{rate}% Hoàn thành</span>
                                </div>

                                {/* GIAO DIỆN NHẬP LIỆU MỚI: CHỈ NHẬP SỐ SET */}
                                {isEditing ? (
                                  <div 
                                    className="mt-3 pt-3 border-t border-slate-200/60 flex flex-col gap-2 animate-in slide-in-from-top-2 duration-150"
                                    onClick={(e) => e.stopPropagation()} 
                                  >
                                    <div className="bg-white p-3 rounded-xl border border-slate-200/80 shadow-sm flex flex-col justify-between">
                                      <div className="flex justify-between items-center">
                                        <label className="block text-[10px] font-bold text-slate-500 uppercase tracking-wider">Số Set Đã Xong</label>
                                        <span className="text-[10px] font-extrabold text-indigo-600 bg-indigo-50 px-2 py-0.5 rounded-md">Mục tiêu: {d.target_sets} Sets</span>
                                      </div>
                                      <div className="flex items-center gap-3 mt-1.5">
                                        <input 
                                          type="number" 
                                          min="0"
                                          max={d.target_sets * 2}
                                          value={d.actual_sets || ''} 
                                          onChange={(e) => updateActualSets(d.id, e.target.value)} 
                                          className="w-24 bg-slate-100 border border-slate-200 p-2 rounded-xl text-center font-extrabold text-base text-indigo-700 focus:border-indigo-500 outline-none focus:ring-2 focus:ring-indigo-100" 
                                          placeholder="0"
                                        />
                                        <div className="flex-1 text-xs text-slate-500 font-medium">
                                          ⚡ Quy đổi tự động: <span className="font-extrabold text-slate-800 text-sm">{d.actual_reps || 0}</span> / {d.target_reps} {ex.unit}
                                        </div>
                                      </div>
                                    </div>
                                  </div>
                                ) : (
                                  <div className="text-[9px] text-indigo-500 font-bold text-right mt-1.5 flex items-center justify-end gap-1 opacity-80 hover:opacity-100">
                                    <span>Chạm để cập nhật tiến độ</span>
                                    <svg xmlns="http://www.w3.org/2000/svg" width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                                  </div>
                                )}
                              </div>
                            );
                          })}
                        </div>
                      )}
                    </div>
                  </div>
                )}

                {/* TAB 2: QUẢN LÝ DANH MỤC BÀI TẬP CHUNG */}
                {activeTab === 'exercises' && (
                  <div className="space-y-4 animate-in fade-in duration-200">
                    
                    {/* TIÊU ĐỀ KÈM NÚT AI SIÊU COMPACT */}
                    <div className="flex justify-between items-center bg-white p-3 rounded-2xl border border-slate-100 shadow-sm">
                      <h2 className="text-sm font-bold text-slate-800 uppercase tracking-wider">Danh mục Bài Tập</h2>
                      <button 
                        onClick={runGeminiAnalysis} 
                        className="flex items-center gap-1.5 bg-gradient-to-r from-indigo-600 to-slate-900 text-white text-[10px] font-extrabold py-2 px-3 rounded-xl shadow-md hover:brightness-110 active:scale-95 transition-all duration-200"
                        title="Phân tích BMI và tối ưu hóa hệ cơ số 5 bằng Gemini"
                      >
                        <Sparkles size={11} className="text-yellow-300 animate-pulse" />
                        <span>HLV AI TỐI ƯU</span>
                      </button>
                    </div>

                    {/* Form thêm bài tập gốc */}
                    <div className={`p-4 rounded-2xl border ${exForm.id ? 'bg-amber-50 border-amber-200' : 'bg-white border-slate-100'} shadow-sm`}>
                      <h3 className="font-bold text-xs text-slate-800 uppercase tracking-wider mb-3 flex items-center gap-1.5">
                        {exForm.id ? <><Edit2 size={14} className="text-amber-500" /> Sửa bài tập</> : <><Plus size={14} className="text-indigo-500" /> Tạo bài tập mới</>}
                      </h3>
                      <form onSubmit={saveExercise} className="space-y-3">
                        <div>
                          <label className="block text-[10px] font-bold text-slate-400 uppercase mb-1">Tên bài tập</label>
                          <input required name="name" value={exForm.name} onChange={handleExFormChange} type="text" className="w-full border border-slate-200 rounded-xl p-2.5 text-xs font-semibold focus:border-indigo-500 outline-none" placeholder="Ví dụ: Hít đất, Squat..." />
                        </div>
                        
                        <div className="grid grid-cols-2 gap-3">
                          <div>
                            <label className="block text-[10px] font-bold text-slate-400 uppercase mb-1">Mục tiêu mặc định</label>
                            <input required name="target_value" value={exForm.target_value} onChange={handleExFormChange} type="number" className="w-full border border-slate-200 rounded-xl p-2.5 text-xs font-semibold focus:border-indigo-500 outline-none" />
                          </div>
                          <div>
                            <label className="block text-[10px] font-bold text-slate-400 uppercase mb-1">Đơn vị</label>
                            <select name="unit" value={exForm.unit} onChange={handleExFormChange} className="w-full border border-slate-200 rounded-xl p-2.5 text-xs font-semibold focus:border-indigo-500 outline-none bg-white">
                              <option value="rep">rep</option>
                              <option value="giây">giây</option>
                              <option value="phút">phút</option>
                              <option value="km">km</option>
                            </select>
                          </div>
                          <div>
                            <label className="block text-[10px] font-bold text-slate-400 uppercase mb-1">Số Sets mặc định</label>
                            <input required name="target_sets" value={exForm.target_sets} onChange={handleExFormChange} type="number" className="w-full border border-slate-200 rounded-xl p-2.5 text-xs font-semibold focus:border-indigo-500 outline-none" />
                          </div>
                          <div>
                            <label className="block text-[10px] font-bold text-slate-400 uppercase mb-1">Độ khó (Points)</label>
                            <input required name="point" value={exForm.point} onChange={handleExFormChange} type="number" className="w-full border border-slate-200 rounded-xl p-2.5 text-xs font-semibold focus:border-indigo-500 outline-none" />
                          </div>
                        </div>

                        <div className="flex gap-2 pt-1">
                          <button type="submit" className={`flex-1 text-white font-bold py-2.5 rounded-xl text-xs transition active:scale-95 ${exForm.id ? 'bg-amber-500 hover:bg-amber-600' : 'bg-indigo-600 hover:bg-indigo-700'}`}>
                            {exForm.id ? 'Cập Nhật' : 'Thêm Vào Kho'}
                          </button>
                          {exForm.id && (
                            <button type="button" onClick={() => setExForm({ id: null, name: '', target_value: 100, unit: 'rep', target_sets: 3, point: 5 })} className="px-4 bg-slate-200 text-slate-700 rounded-xl text-xs font-bold hover:bg-slate-300">
                              Hủy
                            </button>
                          )}
                        </div>
                      </form>
                    </div>

                    {/* Danh sách bài tập */}
                    <div className="space-y-2">
                      <div className="text-[10px] font-bold text-slate-400 uppercase px-1">Danh sách bài tập ({exercises.length})</div>
                      {exercises.map(ex => (
                        <div key={ex.id} className="bg-white p-3.5 rounded-2xl shadow-sm border border-slate-100 flex justify-between items-center">
                          <div>
                            <span className="font-bold text-slate-800 text-xs block">{ex.name}</span>
                            <span className="text-[10px] text-slate-400 mt-1 block">
                              Mục tiêu: {ex.target_value} {ex.unit} • {ex.target_sets} Sets • Điểm: <span className="text-indigo-600 font-bold">+{ex.point}p</span>
                            </span>
                          </div>
                          <div className="flex gap-1.5">
                            <button onClick={() => editExercise(ex)} className="p-2 text-slate-400 hover:text-amber-500 bg-slate-50 rounded-xl transition active:scale-90">
                              <Edit2 size={14} />
                            </button>
                            <button onClick={() => deleteExercise(ex.id)} className="p-2 text-slate-400 hover:text-red-500 bg-slate-50 rounded-xl transition active:scale-90">
                              <Trash2 size={14} />
                            </button>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {/* TAB 3: XẾP LỊCH & THỰC THI */}
                {activeTab === 'plan' && (
                  <div className="space-y-4 animate-in fade-in duration-200">
                    <h2 className="text-xl font-bold text-slate-800">Lịch Tập Của Tôi</h2>

                    {/* --- KHU VỰC LỊCH THÁNG (CALENDAR COMPONENT) --- */}
                    <div className="bg-white rounded-2xl p-3 shadow-sm border border-slate-100">
                      <div className="flex justify-between items-center mb-3">
                        <button onClick={prevMonth} className="p-1.5 text-slate-600 hover:bg-slate-100 rounded-lg active:scale-90">
                          <ChevronLeft size={18} />
                        </button>
                        <h3 className="font-bold text-sm text-slate-800 capitalize">
                          Tháng {calendarMonth.getMonth() + 1}, {calendarMonth.getFullYear()}
                        </h3>
                        <button onClick={nextMonth} className="p-1.5 text-slate-600 hover:bg-slate-100 rounded-lg active:scale-90">
                          <ChevronRight size={18} />
                        </button>
                      </div>

                      <div className="grid grid-cols-7 gap-1 text-center text-[10px] font-bold text-slate-400 uppercase mb-2">
                        <span>T2</span><span>T3</span><span>T4</span><span>T5</span><span>T6</span><span>T7</span><span>CN</span>
                      </div>

                      <div className="grid grid-cols-7 gap-1">
                        {calendarDays.map((cell, idx) => {
                          const dateStr = formatLocalDate(cell.date);
                          const hasPlan = plans.find(p => p.date === dateStr);
                          const isSelected = selectedDate === dateStr;
                          const isToday = todayStr === dateStr;
                          
                          let dayBg = 'bg-transparent text-slate-800';
                          if (!cell.isCurrentMonth) dayBg = 'text-slate-300';
                          if (isToday) dayBg = 'bg-indigo-50 text-indigo-600 font-extrabold ring-1 ring-indigo-200';
                          if (isSelected) dayBg = 'bg-indigo-600 text-white font-black shadow-md shadow-indigo-100';

                          return (
                            <button
                              key={idx}
                              onClick={() => setSelectedDate(dateStr)}
                              className={`aspect-square flex flex-col justify-center items-center rounded-xl text-xs font-semibold relative transition active:scale-90 ${dayBg}`}
                            >
                              <span>{cell.date.getDate()}</span>
                              {hasPlan && (
                                <span className={`absolute bottom-1 w-1.5 h-1.5 rounded-full ${isSelected ? 'bg-white' : 'bg-emerald-500'}`}></span>
                              )}
                            </button>
                          );
                        })}
                      </div>
                    </div>

                    {/* TRẠNG THÁI NGÀY ĐANG CHỌN */}
                    <div className="bg-slate-100/50 p-1 rounded-2xl">
                      <div className="p-3 bg-indigo-50/60 rounded-xl flex justify-between items-center border border-indigo-100">
                        <div>
                          <p className="text-[10px] font-bold text-indigo-400 uppercase">Ngày đang chọn</p>
                          <p className="text-sm font-black text-indigo-900">{selectedDate}</p>
                        </div>
                        {activePlan ? (
                          <span className="flex items-center gap-1 text-[10px] font-bold bg-emerald-100 text-emerald-800 px-3 py-1 rounded-full">
                            <Lock size={10} /> ĐÃ KHÓA LỊCH
                          </span>
                        ) : (
                          <span className="flex items-center gap-1 text-[10px] font-bold bg-amber-100 text-amber-800 px-3 py-1 rounded-full">
                            <LockOpen size={10} /> CHƯA CÓ LỊCH
                          </span>
                        )}
                      </div>
                    </div>

                    {/* THỰC THI HOẶC XẾP LỊCH */}
                    {activePlan ? (
                      <div className="space-y-3 animate-in slide-in-from-bottom-3 duration-200">
                        <div className="flex justify-between items-center px-1">
                          <h3 className="font-bold text-slate-800 text-xs uppercase tracking-wider">Thực thi bài tập thực tế</h3>
                          <span className="text-[10px] font-bold bg-indigo-100 text-indigo-700 px-2 py-0.5 rounded">
                            Mức Point: {currentPoints}/{activePlan.total_point_limit} Pts
                          </span>
                        </div>

                        {activeDetails.map((d, index) => {
                          const ex = exercises.find(e => e.id === d.exercise_id);
                          if (!ex) return null;
                          return (
                            <div key={d.id} className="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 space-y-3 relative">
                              <div className="flex justify-between items-center border-b border-slate-50 pb-2">
                                <h4 className="font-bold text-slate-800 text-xs">
                                  {index + 1}. {ex.name}
                                </h4>
                                <span className="text-[10px] font-bold text-indigo-600 bg-indigo-50 px-2 py-0.5 rounded">
                                  +{ex.point} Point
                                </span>
                              </div>

                              {/* CHỈ CẦN NHẬP SỐ SET ĐÃ XONG TRONG TAB LỊCH TẬP */}
                              <div className="bg-slate-50 p-3 rounded-xl border border-slate-100 flex flex-col gap-2">
                                <div className="flex justify-between items-center">
                                  <label className="block text-[10px] font-black text-slate-500 uppercase tracking-wider">Nhập Số Set Hoàn Thành</label>
                                  <span className="text-[10px] font-bold text-slate-400">Yêu cầu: {d.target_sets} Sets</span>
                                </div>
                                <div className="flex items-center gap-3">
                                  <input 
                                    type="number" 
                                    min="0"
                                    value={d.actual_sets || ''} 
                                    onChange={(e) => updateActualSets(d.id, e.target.value)} 
                                    className="w-24 bg-white border border-slate-200 p-2 rounded-xl text-center font-extrabold text-base text-indigo-700 focus:border-indigo-500 outline-none focus:ring-2 focus:ring-indigo-100" 
                                    placeholder="0"
                                  />
                                  <div className="text-xs text-slate-500">
                                    🎉 Tự động quy đổi: <span className="font-extrabold text-indigo-600 text-sm">{d.actual_reps || 0}</span> / {d.target_reps} {ex.unit}
                                  </div>
                                </div>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    ) : (
                      <div className="space-y-4 animate-in slide-in-from-bottom-3 duration-200">
                        <div className="bg-white p-3 rounded-2xl border border-slate-100 shadow-sm flex justify-between items-center">
                          <span className="text-xs font-bold text-slate-600">Giới hạn thể lực (Elo Point):</span>
                          <span className="text-sm font-black text-indigo-700 bg-indigo-50 px-3 py-1 rounded-lg border border-indigo-100">
                            {userPointsLimit} Pts
                          </span>
                        </div>

                        <div className="bg-white rounded-2xl border border-slate-100 p-3 shadow-sm">
                          <p className="text-[10px] font-bold text-slate-400 uppercase mb-2">Chạm để thêm bài tập vào lịch:</p>
                          <div className="flex gap-1.5 overflow-x-auto pb-2.5 custom-scrollbar">
                            {exercises.map(ex => {
                              const alreadyAdded = scheduleDraft.some(item => item.exercise_id === ex.id);
                              return (
                                <button
                                  key={ex.id}
                                  onClick={() => addExerciseToDraft(ex.id)}
                                  disabled={alreadyAdded}
                                  className={`px-3 py-2 rounded-xl text-xs font-bold flex-shrink-0 flex items-center gap-1 transition ${alreadyAdded ? 'bg-slate-100 text-slate-300' : 'bg-indigo-50 text-indigo-600 hover:bg-indigo-100 active:scale-95'}`}
                                >
                                  <Plus size={12} /> {ex.name} (+{ex.point}p)
                                </button>
                              );
                            })}
                          </div>
                        </div>

                        <div className="space-y-3">
                          <div className="flex justify-between items-center px-1">
                            <h3 className="font-bold text-slate-800 text-xs uppercase tracking-wider">Lịch nháp ({scheduleDraft.length})</h3>
                            <span className="text-[10px] font-extrabold text-indigo-600 bg-indigo-50 px-2 py-0.5 rounded">
                              Đã xếp: {draftTotalPoints}/{userPointsLimit} pts
                            </span>
                          </div>

                          {scheduleDraft.length === 0 ? (
                            <div className="bg-white rounded-2xl p-8 border border-dashed border-slate-200 text-center text-slate-400">
                              <CalendarIcon size={36} className="mx-auto mb-2 opacity-25" />
                              <p className="text-xs">Chưa có bài tập nào.</p>
                            </div>
                          ) : (
                            <div className="space-y-2.5">
                              {scheduleDraft.map((item, idx) => {
                                const ex = exercises.find(e => e.id === item.exercise_id);
                                if (!ex) return null;
                                return (
                                  <div key={item.exercise_id} className="bg-white p-3 rounded-2xl border border-slate-100 shadow-sm relative space-y-3">
                                    <button onClick={() => removeExerciseFromDraft(item.exercise_id)} className="absolute top-3 right-3 text-slate-300 hover:text-red-500">
                                      <Trash2 size={14} />
                                    </button>
                                    <h4 className="font-bold text-slate-800 text-xs pr-6">{idx + 1}. {ex.name} (+{ex.point} pts)</h4>
                                    <div className="grid grid-cols-2 gap-3 pt-1">
                                      <div>
                                        <label className="block text-[9px] font-bold text-slate-400 uppercase mb-0.5">Số {ex.unit}</label>
                                        <input type="number" value={item.target_reps} onChange={(e) => updateDraftValue(item.exercise_id, 'target_reps', e.target.value)} className="w-full bg-slate-50 border border-slate-100 rounded-lg p-1.5 text-center text-xs font-bold text-slate-700" />
                                      </div>
                                      <div>

                                    </div>
                                  </div>
                                );

                                <Lock size={14} /> Lưu Lịch Tập & Khóa Mục Tiêu

                            </div>

                      </div>
